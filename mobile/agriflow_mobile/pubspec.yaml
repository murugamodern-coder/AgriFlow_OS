name: agriflow_mobile
description: AgriFlow OS — offline-first field operations mobile app.
publish_to: "none"
version: 0.24.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  connectivity_plus: ^6.1.1
  equatable: ^2.0.7
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.18.0
  json_annotation: ^4.9.0
  sentry_flutter: ^8.9.0
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.5.2
  flutter_animate: ^4.5.2
  lottie: ^3.1.2
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/design_tokens/
    - assets/lottie/
